<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="secure_pos">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CloudRecord</title>
  <link rel="manifest" href="manifest.json">
  <!-- 
    La configuración de Flutter Web ahora se maneja automáticamente.
    Ya NO se usa window.flutterConfiguration (obsoleto).
    El archivo flutter_bootstrap.js usa internamente engineInitializer.initializeEngine().
  -->
<script type="text/javascript" crossorigin="anonymous">            window.ff_trigger_firebase_core = async (callback) => {
              console.debug("Initializing Firebase firebase_core");
              callback(await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js"));
            };
          </script><script type="text/javascript" crossorigin="anonymous">            window.ff_trigger_firebase_firestore = async (callback) => {
              console.debug("Initializing Firebase firebase_firestore");
              callback(await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js"));
            };
          </script><script type="text/javascript" crossorigin="anonymous">            window.ff_trigger_firebase_auth = async (callback) => {
              console.debug("Initializing Firebase firebase_auth");
              callback(await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js"));
            };
          </script><script type="text/javascript" crossorigin="anonymous">            window.ff_trigger_firebase_storage = async (callback) => {
              console.debug("Initializing Firebase firebase_storage");
              callback(await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-storage.js"));
            };
          </script></head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
